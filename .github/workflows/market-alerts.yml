name: Market Alerts

on:
  schedule:
    # Tous les jours ouvrés à 06:00 UTC (~07:00 France hiver)
    - cron: "0 6 * * 1-5"
  # Bouton "Run workflow" manuel
  workflow_dispatch:

jobs:
  run-market-alerts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run market alerts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m app.main
